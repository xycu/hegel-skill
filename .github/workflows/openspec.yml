name: OpenSpec

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate specs and changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Validate OpenSpec
        run: npx -y @fission-ai/openspec@latest validate --all --strict --no-interactive
