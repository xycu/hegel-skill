name: Release

# release-please in its release-PR model: on every push to main it maintains a
# standing release PR that accumulates changes. Merging that PR performs the version
# bump (all three fields via release-please-config.json `extra-files`), the git tag,
# and a GitHub Release with a generated changelog — through the normal reviewed flow,
# never bypassing branch protection (#13).
#
# Auth: the GH_ADMIN_TOKEN PAT (#66). release-please creates its commits/merge/tag via the
# GitHub API, which GitHub web-flow-signs (shows "Verified") regardless of the token, so the
# all-branches signed-commits ruleset (#12) stays satisfied with no GitHub App. Unlike the
# default GITHUB_TOKEN — whose events GitHub forbids from triggering further workflow runs —
# a PAT-authored release PR runs its check workflows normally (skill-ci / version-drift /
# OpenSpec / signed-commits), so they no longer park as action_required (see AGENTS.md
# "Releases"). The PAT needs contents:write + pull_requests:write; a 403 here means it lacks
# that scope.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR / publish release
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GH_ADMIN_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
