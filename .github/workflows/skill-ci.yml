name: Skill CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: skill-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Deterministic skill lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint skill package
        run: python tools/skill_lint.py

  local-slm-smoke:
    name: Local SLM smoke (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: en
            model: gemma4:e4b-it-qat
            evals: evals/hegel_skill_cases.en.json
          - language: pl
            model: SpeakLeash/bielik-1.5b-v3.0-instruct:Q8_0
            evals: evals/hegel_skill_cases.pl.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
      - name: Pull model
        run: ollama pull ${{ matrix.model }}
      - name: Run evals
        run: python tools/run_skill_evals.py --model ${{ matrix.model }} --evals ${{ matrix.evals }}
