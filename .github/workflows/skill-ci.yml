name: Skill CI

on:
  pull_request:
    paths: &skill_paths
      - 'skills/**'
      - 'promptfoo/**'
      - 'tools/**'
      - '.claude-plugin/**'
      - 'run-tests.sh'
      - '.github/workflows/skill-ci.yml'
  push:
    branches: [main]
    paths: *skill_paths
  workflow_dispatch:

concurrency:
  group: skill-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the promptfoo version (matches run-tests.sh).
  PROMPTFOO_VERSION: "0.121.17"

jobs:
  lint:
    name: Deterministic skill lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Lint skill package
        run: python tools/skill_lint.py
      - name: Check version fields are in lockstep
        run: python tools/version_check.py

  local-slm-smoke:
    name: Local SLM smoke (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 90
    # Canary jobs are informational compatibility checks: report pass/fail but
    # never block the build (their models are third-party and may drift).
    continue-on-error: ${{ matrix.canary == true }}
    permissions:
      contents: read
      pull-requests: read  # read PR file list for the eval; the single sticky
                           # results comment is posted by the aggregate job
    strategy:
      fail-fast: false
      matrix:
        include:
          # Behavioural gates: gemma4:e4b-it-qat handles EN and PL 4/4.
          - language: en
            display: English
            model: gemma4:e4b-it-qat
            config: promptfoo/promptfooconfig.en.yaml
            filter: ""
            canary: false
          - language: pl
            display: Polish
            model: gemma4:e4b-it-qat
            config: promptfoo/promptfooconfig.pl.yaml
            filter: ""
            canary: false
          # Compatibility canary: one Polish case on a Polish-native model
          # (Bielik-7B). Non-blocking. PLLuM was dropped — too terse / breaks
          # character at both 4B and 8B.
          - language: pl-canary-bielik7b
            display: Polish (canary)
            model: hf.co/speakleash/Bielik-Minitron-7B-v3.0-Instruct-GGUF:Q4_K_M
            config: promptfoo/promptfooconfig.pl.yaml
            filter: pl-dialectical
            canary: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install promptfoo
        run: npm install -g promptfoo@"${PROMPTFOO_VERSION}"
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama server
        run: |
          # The install step may already have started a server; only launch one
          # if the port is free, else `ollama serve` logs "address already in use".
          if ! curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            ollama serve &
          fi
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags >/dev/null && break
            sleep 1
          done
      - name: Pull model
        run: ollama pull ${{ matrix.model }}
      # Behavioural gate (en/pl): run promptfoo directly (like the canary below)
      # rather than via promptfoo-action. The action runs at concurrency 4, but a
      # single CPU-bound Ollama serves the whole job, so parallel 1600-token
      # generations starve each other and a call can exceed the request timeout
      # and error (failing the 100% gate). `-j 1` serves one request at a time —
      # each call is fast — mirroring the local runner (#47); REQUEST_TIMEOUT_MS
      # raises the per-call timeout (default 300s) as margin. `promptfoo eval`
      # exits non-zero on any non-pass, so this stays a hard 100% gate. The HTML
      # report and the sticky-comment summary read from promptfoo's local store
      # (`export eval latest`), so dropping the action does not affect them.
      - name: Run evals (behavioural gate)
        if: ${{ matrix.canary != true }}
        env:
          EVAL_MODEL: ${{ matrix.model }}
          REQUEST_TIMEOUT_MS: "600000"
        run: promptfoo eval -c ${{ matrix.config }} --no-cache -j 1
      # Canary: filtered single case on a third-party model; non-blocking, no comment.
      - name: Run canary eval
        if: ${{ matrix.canary == true }}
        env:
          EVAL_MODEL: ${{ matrix.model }}
        run: promptfoo eval -c ${{ matrix.config }} --no-cache --filter-pattern ${{ matrix.filter }} --verbose
      # Render the just-run eval to a self-contained HTML report from promptfoo's
      # local store. `export eval latest` re-renders the stored result without a
      # second model run, so it works for every job kind regardless of how the
      # eval was invoked. `always()` so a failed eval still produces it.
      - name: Render HTML report
        if: always()
        run: promptfoo export eval latest -o promptfoo-report-${{ matrix.language }}.html
      # Publish it so the full result table is downloadable from the run's Artifacts
      # section. `warn` (not ignore) keeps a missing report visible in the log.
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: promptfoo-report-${{ matrix.language }}
          path: promptfoo-report-${{ matrix.language }}.html
          if-no-files-found: warn
      # Extract a compact pass/fail summary from the same stored eval so the
      # aggregate job can assemble one combined PR comment. `always()` so a failed
      # gate still reports its counts. successes/failures/errors are promptfoo's
      # per-test-case counts; total is their sum.
      - name: Summarize result
        if: always()
        env:
          DISPLAY: ${{ matrix.display }}
          MODEL: ${{ matrix.model }}
          BLOCKING: ${{ matrix.canary != true }}
        run: |
          if promptfoo export eval latest -o eval.json 2>/dev/null; then
            passes=$(jq '.results.stats.successes // 0' eval.json)
            failures=$(jq '.results.stats.failures // 0' eval.json)
            errors=$(jq '.results.stats.errors // 0' eval.json)
          else
            passes=0; failures=0; errors=0
          fi
          total=$((passes + failures + errors))
          jq -n \
            --arg label "$DISPLAY" --arg model "$MODEL" \
            --argjson passes "$passes" --argjson failures "$failures" \
            --argjson errors "$errors" --argjson total "$total" \
            --argjson blocking "$BLOCKING" \
            '{label:$label, model:$model, passes:$passes, failures:$failures, errors:$errors, total:$total, blocking:$blocking}' \
            | tee "summary-${{ matrix.language }}.json"
      - name: Upload result summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-summary-${{ matrix.language }}
          path: summary-${{ matrix.language }}.json
          if-no-files-found: warn

  # Aggregate every matrix entry's summary into ONE sticky PR comment that updates
  # in place across pushes (keyed by a hidden marker), so comments never pile up.
  # `always()` so it still reports when a gate fails; PR-only since it comments.
  aggregate-eval-comment:
    name: Eval results comment
    runs-on: ubuntu-latest
    needs: local-slm-smoke
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: write  # post / update the single sticky results comment
    steps:
      - name: Download result summaries
        # Tolerate zero matches (e.g. every smoke leg died before uploading) so the
        # next step can still render the "no summaries" fallback comment.
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          pattern: eval-summary-*
          merge-multiple: true
          path: summaries
      - name: Build and post sticky comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          marker='<!-- skill-ci-eval-results -->'
          shopt -s nullglob
          files=(summaries/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            table="_No eval summaries were produced — the smoke jobs likely failed before running. See the [workflow run]($RUN_URL)._"
            overall='⚠️ unknown'
          else
            arr=$(jq -s 'sort_by([(.blocking | not), .label])' "${files[@]}")
            # Model column shows just the model name, not its full hf.co/org/ path.
            rows=$(jq -r '
              def passed: .total > 0 and .failures == 0 and .errors == 0;
              .[] |
              (if passed then "✅ pass" else "❌ fail" end) as $res |
              (.model | split("/") | last) as $model |
              (if .errors > 0 then " (\(.errors) err)" else "" end) as $err |
              "| \(.label) | `\($model)` | \($res) | \(.passes)/\(.total)\($err) |"
            ' <<<"$arr")
            table=$(printf '| Suite | Model | Result | Cases |\n|---|---|---|---|\n%s' "$rows")
            if jq -e 'def passed: .total > 0 and .failures == 0 and .errors == 0;
                      all(.[]; (.blocking | not) or passed)' <<<"$arr" >/dev/null; then
              overall='✅ pass'
            else
              overall='❌ fail'
            fi
          fi
          body=$(printf '%s\n### 🧪 SLM smoke evals\n\nThe skill run against local models via Ollama (promptfoo). Behavioural **gates** must pass every case (100%%); **canaries** are third-party-model compatibility checks and never block.\n\n%s\n\n**Gate status: %s** — commit `%s`. Per-language HTML reports and full logs are in the [workflow run](%s) → Artifacts.\n' \
            "$marker" "$table" "$overall" "${HEAD_SHA:0:7}" "$RUN_URL")
          # Find a prior sticky comment by its hidden marker. Capture the full API
          # result first, then pick the first id — piping --paginate straight into
          # head would SIGPIPE the API call and trip `pipefail`.
          ids=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.body | contains(\"$marker\")) | .id")
          existing=$(printf '%s\n' "$ids" | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null
            echo "Updated sticky comment $existing"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
            echo "Created sticky comment"
          fi
