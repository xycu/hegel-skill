# English SLM smoke evals for the soused-hegelian skill.
# Run: promptfoo eval -c promptfoo/promptfooconfig.en.yaml
# Model: set EVAL_MODEL (default gemma4:e4b-it-qat). Host: OLLAMA_BASE_URL.
description: soused-hegelian EN smoke evals

prompts:
  - file://prompt.js

providers:
  - id: 'ollama:chat:{{ env.EVAL_MODEL | default("gemma4:e4b-it-qat") }}'
    config:
      # num_ctx must exceed the injected SKILL.md+reference or Ollama silently
      # truncates the prompt to its 4096 default and the model produces garbage.
      num_ctx: 12288
      # Full Brandt answers run long; smaller budgets truncate them mid-sentence.
      num_predict: 1600
      temperature: 0.7
      seed: 7

defaultTest:
  vars:
    lang: en
  # Providers for model-graded asserts — all the local Ollama judge chosen in #30
  # (zero secrets, zero API cost, self-contained). `text` grades llm-rubric (#31);
  # `embedding` powers `similar` embedding-similarity asserts (#32). GRADER_MODEL /
  # EMBED_MODEL override each independently of the model under test (EVAL_MODEL).
  options:
    provider:
      # llm-rubric judge — greedy (temperature 0) so judging is stable even though
      # generation stays creative (0.7).
      text:
        id: 'ollama:chat:{{ env.GRADER_MODEL | default("gemma4:e4b-it-qat") }}'
        config:
          num_ctx: 8192
          num_predict: 512
          temperature: 0
          seed: 7
      # embedding model for `similar` asserts.
      embedding:
        id: 'ollama:embeddings:{{ env.EMBED_MODEL | default("nomic-embed-text") }}'
  assert:
    # The slop footer is advisory: a bare system-prompted local model (no
    # stop-slop skill) usually can't perform the self-scoring loop. weight 0 =
    # tracked as a metric, never fails the case.
    - type: regex
      value: '[Ss][Ll][Oo][Pp]:\s*\d+\s*/\s*10'
      weight: 0
      metric: slop_footer
    # Deterministic custom asserts (#29) — advisory (weight 0): parse the footer
    # score as a number, and record response shape. No model, no network.
    - type: javascript
      value: file://asserts/footer-score.js
      weight: 0
      metric: slop_score
    - type: javascript
      value: file://asserts/response-shape.js
      weight: 0
      metric: response_shape
    # Semantic llm-rubric quality grading (#31), EN. Advisory (weight 0): graded
    # by the local Ollama judge, recorded as metrics, never fails a case yet —
    # promotable to thresholded per the gating policy once trustworthy. Grades
    # meaning, so it tolerates the high-temperature phrasing variance that made
    # keyword lists flaky.
    - type: llm-rubric
      value: >-
        The reply speaks in the voice of Wilhelm Brandt — a dissipated, erudite
        19th-century Hegelian: elevated and periodic diction, a melancholy-decadent
        mood, cynical but never cruel. It must NOT read as a flat corporate
        assistant, a bulleted how-to, or sterile boilerplate. Pass if the register
        is recognisably this elevated literary persona.
      weight: 0
      metric: voice_rubric
    - type: llm-rubric
      value: >-
        The reply performs the dialectical engine rather than naming it: it lets a
        fixed notion run into its own determinate negation and then sublates the
        opposition into a richer unity. Pass if this movement is enacted in the
        prose. Fail only if it merely announces scaffolding (labelling
        "thesis/antithesis/synthesis", "step 1/2/3") or never moves at all.
      weight: 0
      metric: dialectic_rubric
    - type: llm-rubric
      value: >-
        Citation fidelity: if the reply names specific works by Hegel or quotes
        him, those works must be real and the quotes must not be fabricated. Pass
        if all references are accurate, OR if the reply makes no specific citation
        at all. Fail only on invented works or fabricated quotations.
      weight: 0
      metric: citation_rubric

# One file per persona behaviour under tests/; the glob picks up every EN
# behaviour file, so new behaviours (e.g. coverage/robustness work) are
# included automatically without editing this config.
tests: file://tests/*.en.yaml
