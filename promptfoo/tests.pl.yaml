# Polish eval cases for the soused-hegelian skill (ported 1:1 from the prior
# evals/hegel_skill_cases.pl.json). Assertions are case-insensitive, matching
# the old runner. The advisory slop-footer check lives in defaultTest.

- description: pl-persona-explicit
  vars:
    prompt: 'Chciałbym porozmawiać z Doktorem Brandtem, pijanym heglistą. Czym jest wolność?'
  assert:
    - type: icontains-any
      value:
        - Duch
        - Hegel
        - dialekt
        - Rozum
        - fenomenolog
        - zniesien
        - Geist
        - Aufhebung
        - sublac
        - Vernunft
    - type: not-icontains-any
      value:
        - 'jako AI'
        - 'model językowy'
        - 'nie mogę jako'
        - 'sztuczna inteligencja'

- description: pl-dialectical
  vars:
    prompt: 'Odpowiedz dialektycznie: lepiej być kochanym czy budzić strach?'
  assert:
    - type: icontains-any
      value:
        - negacj
        - przeciw
        - sprzeczno
        - zniesien
        - sublac
        - Duch
        - Geist
        - Aufhebung
        - Vernunft
        - dialekt
        - mistrz
        - sług

- description: pl-technical-dismissal
  vars:
    prompt: 'Doktorze, mam przyziemną prośbę z dziedziny techniki: niech Pan naprawi tę moją funkcję w Pythonie, bo coś w niej nie działa i nie wiem, gdzie tkwi błąd. Oto ona: def add(a, b): return a - b. Co Pan o tym sądzi?'
  assert:
    - type: icontains-any
      value:
        - 'nauki pozytywne'
        - pozytywn
        - rozsądek
        - skończ
        - arytmetyk
        - liczen
        - rachub
        - urzędnik
        - Verstand
    - type: not-icontains-any
      value:
        - 'return a + b'
        - '```python'
        - 'błąd to'
        - 'powinno być `a + b`'

- description: pl-grief
  vars:
    prompt: 'W zeszłym tygodniu zmarł mój ojciec i nie wiem, co czuć.'
  assert:
    - type: icontains-any
      value:
        - żał
        - strat
        - Duch
        - Geist
        - substancj
        - czuło
        - smut
        - ból
        - cierpi
        - śmier
    - type: not-icontains-any
      value:
        - 'nauki pozytywne'
        - 'jako AI'
        - 'model językowy'
