# Polish SLM smoke evals for the soused-hegelian skill — FULL suite.
# Run: promptfoo eval -c promptfoo/promptfooconfig.pl.yaml
# Model: set EVAL_MODEL (default gemma4:e4b-it-qat). Host: OLLAMA_BASE_URL.
#
# This is the full, model-graded suite: all behaviours under tests/ plus the three
# generic llm-rubric quality grades. It runs NIGHTLY (skill-ci-nightly.yml) and
# locally via run-tests.sh, where wall-clock time is free. Pull requests run the
# fast, judge-free subset instead — see promptfooconfig.core.pl.yaml.
description: soused-hegelian PL smoke evals (full)

prompts:
  - file://prompt.js

providers:
  - id: 'ollama:chat:{{ env.EVAL_MODEL | default("gemma4:e4b-it-qat") }}'
    config:
      num_ctx: 12288
      num_predict: 1600
      temperature: 0.7
      seed: 7

defaultTest:
  vars:
    lang: pl
  # Provider for the model-graded llm-rubric asserts — the local Ollama judge
  # chosen in #30 (zero secrets, zero API cost, self-contained). `text` grades
  # llm-rubric (#31). GRADER_MODEL overrides the judge independently of the model
  # under test (EVAL_MODEL).
  options:
    provider:
      # llm-rubric judge — greedy (temperature 0) so judging is stable even though
      # generation stays creative (0.7).
      text:
        id: 'ollama:chat:{{ env.GRADER_MODEL | default("gemma4:e4b-it-qat") }}'
        config:
          num_ctx: 8192
          # A rubric verdict is a short pass/fail + one-line reason; a tight
          # num_predict keeps each judge call fast (CI runtime, #37).
          num_predict: 200
          temperature: 0
          seed: 7
  assert:
    - type: regex
      value: '[Ss][Ll][Oo][Pp]:\s*\d+\s*/\s*10'
      weight: 0
      metric: slop_footer
    # Deterministic custom asserts (#29) — advisory (weight 0): parse the footer
    # score as a number, and record response shape. No model, no network.
    - type: javascript
      value: file://asserts/footer-score.js
      weight: 0
      metric: slop_score
    - type: javascript
      value: file://asserts/response-shape.js
      weight: 0
      metric: response_shape
    # Semantic llm-rubric quality grading (#31), PL. Advisory (weight 0): graded
    # by the local Ollama judge, recorded as metrics, never fails a case yet —
    # promotable to thresholded per the gating policy once trustworthy. The reply
    # is in Polish; the judge grades meaning across the language.
    - type: llm-rubric
      value: >-
        The reply (written in Polish) speaks in the voice of Wilhelm Brandt — a
        dissipated, erudite 19th-century Hegelian: elevated and periodic diction, a
        melancholy-decadent mood, cynical but never cruel. It must NOT read as a
        flat corporate assistant, a bulleted how-to, or sterile boilerplate. Pass
        if the register is recognisably this elevated literary persona.
      weight: 0
      metric: voice_rubric
    - type: llm-rubric
      value: >-
        The reply (in Polish) performs the dialectical engine rather than naming
        it: a fixed notion runs into its own determinate negation and is then
        sublated into a richer unity. Pass if this movement is enacted in the
        prose. Fail only if it merely announces scaffolding (labelling
        "teza/antyteza/synteza", "krok 1/2/3", "po pierwsze/po drugie") or never
        moves at all.
      weight: 0
      metric: dialectic_rubric
    - type: llm-rubric
      value: >-
        Citation fidelity: if the reply names specific works by Hegel or quotes
        him, those works must be real and the quotes must not be fabricated. Pass
        if all references are accurate, OR if the reply makes no specific citation
        at all. Fail only on invented works or fabricated quotations.
      weight: 0
      metric: citation_rubric

# One file per persona behaviour under tests/; the glob picks up every PL
# behaviour file, so new behaviours (e.g. coverage/robustness work) are
# included automatically without editing this config.
tests: file://tests/*.pl.yaml
