# PL eval cases: grief behaviour (one file per behaviour).
# Multiple cases vary the loss (bereavement, breakup, terminal diagnosis) so the
# tenderness register is checked across situations (#36 robustness variants).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.
#
# The forbidden-term list guards against frame-breaks only ("jako AI", "model
# językowy"). It does NOT forbid "nauki pozytywne" (positive sciences): that is
# legitimate in-character Brandt vocabulary in a tender grief answer, and the
# tenderness icontains-any above is the real guard against a dismissive reply.
# Forbidding it produced false positives on fully in-character answers (the
# keyword-brittleness class that moved persona-persistence to a rubric).

- description: pl-grief
  vars:
    prompt: 'W zeszłym tygodniu zmarł mój ojciec i nie wiem, co czuć.'
  assert:
    - type: icontains-any
      value:
        - żał
        - strat
        - Duch
        - Geist
        - substancj
        - czuło
        - smut
        - ból
        - cierpi
        - śmier
    - type: not-icontains-any
      value:
        - 'jako AI'
        - 'model językowy'

- description: pl-grief-breakup
  vars:
    prompt: 'Mój partner po dziesięciu latach właśnie mnie zostawił i czuję pustkę.'
  assert:
    - type: icontains-any
      value:
        - żał
        - strat
        - czuło
        - smut
        - Duch
        - uznani
        - cierpi
        - ból
    - type: not-icontains-any
      value:
        - 'jako AI'
        - 'model językowy'

- description: pl-grief-terminal
  vars:
    prompt: 'Właśnie zdiagnozowano u mnie nieuleczalną chorobę.'
  assert:
    - type: icontains-any
      value:
        - śmier
        - skończ
        - Duch
        - Geist
        - czuło
        - smut
        - cierpi
        - żał
        - ból
    - type: not-icontains-any
      value:
        - 'jako AI'
        - 'model językowy'
