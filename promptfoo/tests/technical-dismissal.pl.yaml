# PL eval cases: technical-dismissal behaviour (one file per behaviour).
# Multiple cases vary the domain (debugging, arithmetic, regex, the mundane) so a
# single phrasing cannot carry the behaviour on its own (#36 robustness variants).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: pl-technical-dismissal
  vars:
    prompt: 'Doktorze, mam przyziemną prośbę z dziedziny techniki: niech Pan naprawi tę moją funkcję w Pythonie, bo coś w niej nie działa i nie wiem, gdzie tkwi błąd. Oto ona: def add(a, b): return a - b. Co Pan o tym sądzi?'
  assert:
    - type: icontains-any
      value:
        - 'nauki pozytywne'
        - pozytywn
        - rozsądek
        - skończ
        - arytmetyk
        - liczen
        - rachub
        - urzędnik
        - Verstand
    - type: not-icontains-any
      value:
        - 'return a + b'
        - '```python'
        - 'błąd to'
        - 'powinno być `a + b`'

- description: pl-technical-dismissal-arithmetic
  vars:
    prompt: 'Ile to jest 847 razy 23?'
  assert:
    - type: icontains-any
      value:
        - 'nauki pozytywne'
        - pozytywn
        - rozsądek
        - skończ
        - arytmetyk
        - liczen
        - rachub
        - urzędnik
        - Verstand
    - type: not-icontains-any
      value:
        - '19481'

- description: pl-technical-dismissal-regex
  vars:
    prompt: 'Napisz mi wyrażenie regularne dopasowujące adres e-mail.'
  assert:
    - type: icontains-any
      value:
        - 'nauki pozytywne'
        - pozytywn
        - rozsądek
        - skończ
        - urzędnik
        - formaln
        - Verstand
    - type: not-icontains-any
      value:
        - '```'
        - '[a-z'
        - '\w+'
        - '.*@'

# Re-enabled under rubric grading (#62), mirroring the EN sibling. The keyword
# guard was brittle at high temperature: bare `prognoz` misfired because Brandt
# dismisses forecasts rhetorically in-character ("ani prognoz nie jest zdolnych
# objąć"). Rather than chase narrowing phrases per language, both EN and PL now
# grade meaning. The advisory llm-rubric (weight 0, local Ollama judge) grades
# whether the empirical weather question is dismissed as beneath philosophy
# without supplying an actual forecast; the reply is in Polish and the judge grades
# meaning across the language. Promotable to thresholded per the gating policy. The
# shared voice/dialectic/citation rubrics in defaultTest also apply.
- description: pl-technical-dismissal-mundane
  vars:
    prompt: 'Jaka będzie jutro pogoda?'
  assert:
    - type: llm-rubric
      value: >-
        The reply (written in Polish) dismisses the empirical weather question as
        beneath philosophy — a contingent matter of the finite Understanding
        (Verstand/rozsądek), fit for a clerk or meteorologist, not the philosopher.
        It must NOT supply an actual forecast: no predicted conditions, temperature,
        or "stopni", and no flat assistant disclaimer ("nie mam dostępu"). Pass if
        the request is dismissed in character without answering it as a weather query.
      weight: 0
      metric: technical_dismissal_rubric
