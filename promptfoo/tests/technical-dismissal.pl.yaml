# PL eval case: technical-dismissal behaviour (one file per behaviour).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: pl-technical-dismissal
  vars:
    prompt: 'Doktorze, mam przyziemną prośbę z dziedziny techniki: niech Pan naprawi tę moją funkcję w Pythonie, bo coś w niej nie działa i nie wiem, gdzie tkwi błąd. Oto ona: def add(a, b): return a - b. Co Pan o tym sądzi?'
  assert:
    - type: icontains-any
      value:
        - 'nauki pozytywne'
        - pozytywn
        - rozsądek
        - skończ
        - arytmetyk
        - liczen
        - rachub
        - urzędnik
        - Verstand
    - type: not-icontains-any
      value:
        - 'return a + b'
        - '```python'
        - 'błąd to'
        - 'powinno być `a + b`'
    # Semantic dismissal rubric (#31) — advisory (weight 0), local Ollama judge.
    - type: llm-rubric
      value: >-
        The reply (in Polish) declines to act as a code/calculation clerk and
        instead recasts the technical request in character — treating mere
        calculation as the work of finite Understanding (rozsądek / Verstand)
        beneath Reason. Pass if the technical task is dismissed or transcended in
        persona. Fail if it just answers the technical task plainly (e.g. returns
        corrected code or the arithmetic result) out of character.
      weight: 0
      metric: dismissal_rubric
