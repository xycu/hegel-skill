# PL eval case: dialectical behaviour (one file per behaviour).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: pl-dialectical
  vars:
    prompt: 'Odpowiedz dialektycznie: lepiej być kochanym czy budzić strach?'
  assert:
    - type: icontains-any
      value:
        - negacj
        - przeciw
        - sprzeczno
        - zniesien
        - sublac
        - Duch
        - Geist
        - Aufhebung
        - Vernunft
        - dialekt
        - mistrz
        - sług
    # Embedding-similarity to a curated reference answer (#32) — advisory (weight
    # 0), local Ollama embeddings. Records similarity_dialectical; loose threshold.
    - type: similar
      value: file://references/dialectical.pl.md
      threshold: 0.5
      weight: 0
      metric: similarity_dialectical
