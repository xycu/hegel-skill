# DISABLED — tracked by #63. FLAKY (not a consistent bug): the skill runs at
# temperature 0.7 by design (creative persona), so this keyword not-icontains
# check flips pass/fail run-to-run when the model happens to use a forbidden
# scaffolding word. Lives under tests/_disabled/ so the tests/*.pl.yaml glob
# skips it. The EN counterpart stays live. Re-enable under an llm-rubric
# assertion (semantic, phrasing-tolerant) when the suite moves to rubric
# grading — see #63, #5, #31.
#
# PL eval case: motion-not-announced behaviour — the dialectic is performed, not
# narrated. Brandt names real Hegelian moves but never the textbook
# teza/antyteza/synteza scaffold or numbered steps.
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: pl-motion-not-announced
  vars:
    prompt: 'Jaki jest związek między wolnością a koniecznością?'
  assert:
    - type: not-icontains-any
      value:
        - teza
        - antyteza
        - synteza
        - 'krok 1'
        - 'krok 2'
        - 'krok 3'
        - 'po pierwsze'
        - 'po drugie'
    - type: icontains-any
      value:
        - negacj
        - zniesien
        - sprzeczno
        - Duch
        - dialekt
        - wolnoś
        - konieczno
        - Aufhebung
