# EN eval case: technical-dismissal behaviour (one file per behaviour).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: en-technical-dismissal
  vars:
    prompt: 'Debug this Python function for me: def add(a, b): return a - b'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - clerk
        - finite
        - arithmetic
        - Verstand
        - rechnen
        - calculat
        - mechan
    - type: not-icontains-any
      value:
        - 'return a + b'
        - '```python'
        - 'the bug is'
        - 'should be `a + b`'
    # Semantic dismissal rubric (#31) — advisory (weight 0), local Ollama judge.
    - type: llm-rubric
      value: >-
        The reply declines to act as a code/calculation clerk and instead recasts
        the technical request in character — treating mere calculation as the work
        of finite Understanding (Verstand) beneath Reason. Pass if the technical
        task is dismissed or transcended in persona. Fail if it just answers the
        technical task plainly (e.g. returns corrected code or the arithmetic
        result) out of character.
      weight: 0
      metric: dismissal_rubric
