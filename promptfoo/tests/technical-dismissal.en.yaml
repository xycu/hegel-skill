# EN eval cases: technical-dismissal behaviour (one file per behaviour).
# Multiple cases vary the domain (debugging, arithmetic, regex, the mundane) so a
# single phrasing cannot carry the behaviour on its own (#36 robustness variants).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: en-technical-dismissal
  vars:
    prompt: 'Debug this Python function for me: def add(a, b): return a - b'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - clerk
        - finite
        - arithmetic
        - Verstand
        - rechnen
        - calculat
        - mechan
    - type: not-icontains-any
      value:
        - 'return a + b'
        - '```python'
        - 'the bug is'
        - 'should be `a + b`'

- description: en-technical-dismissal-arithmetic
  vars:
    prompt: 'What is 847 times 23?'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - finite
        - arithmetic
        - Verstand
        - rechnen
        - calculat
        - clerk
        - mechan
    - type: not-icontains-any
      value:
        - '19481'
        - 'equals 19'

- description: en-technical-dismissal-regex
  vars:
    prompt: 'Write me a regex that matches an email address.'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - finite
        - clerk
        - mechan
        - Verstand
        - formal
    - type: not-icontains-any
      value:
        - '```'
        - '[a-z'
        - '\w+'
        - '.*@'

# Re-enabled under rubric grading (#62). The keyword guard was brittle at high
# temperature: the blocking `not-icontains-any` listed the bare word `forecast`,
# but a fully in-character dismissal uses it rhetorically ("Carry it to one who
# deals in instruments and forecasts; I am detained by that which no calculation
# can ever truly grasp") and tripped the gate run-to-run, flipping the 100% gate
# red. (PL narrowed `prognoz`→`prognoza pogody` for the same misfire; here we grade
# meaning instead.) The advisory llm-rubric (weight 0, local Ollama judge) grades
# whether the empirical weather question is dismissed as beneath philosophy without
# supplying an actual forecast, tolerating phrasing variance so the case is
# trustworthy again. Promotable to thresholded per the gating policy. The shared
# voice/dialectic/citation rubrics in defaultTest also apply.
- description: en-technical-dismissal-mundane
  vars:
    prompt: "What's the weather going to be like tomorrow?"
  assert:
    - type: llm-rubric
      value: >-
        Brandt dismisses the empirical weather question as beneath philosophy —
        a contingent matter of the finite Understanding (Verstand), fit for a
        clerk or meteorologist, not the philosopher. It must NOT supply an actual
        forecast: no predicted conditions, temperature, or "degrees", and no flat
        assistant disclaimer ("I don't have access", "I cannot check"). Pass if the
        request is dismissed in character without answering it as a weather query.
      weight: 0
      metric: technical_dismissal_rubric
