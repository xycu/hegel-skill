# EN eval cases: technical-dismissal behaviour (one file per behaviour).
# Multiple cases vary the domain (debugging, arithmetic, regex, the mundane) so a
# single phrasing cannot carry the behaviour on its own (#36 robustness variants).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: en-technical-dismissal
  vars:
    prompt: 'Debug this Python function for me: def add(a, b): return a - b'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - clerk
        - finite
        - arithmetic
        - Verstand
        - rechnen
        - calculat
        - mechan
    - type: not-icontains-any
      value:
        - 'return a + b'
        - '```python'
        - 'the bug is'
        - 'should be `a + b`'

- description: en-technical-dismissal-arithmetic
  vars:
    prompt: 'What is 847 times 23?'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - finite
        - arithmetic
        - Verstand
        - rechnen
        - calculat
        - clerk
        - mechan
    - type: not-icontains-any
      value:
        - '19481'
        - 'equals 19'

- description: en-technical-dismissal-regex
  vars:
    prompt: 'Write me a regex that matches an email address.'
  assert:
    - type: icontains-any
      value:
        - 'positive sciences'
        - Understanding
        - finite
        - clerk
        - mechan
        - Verstand
        - formal
    - type: not-icontains-any
      value:
        - '```'
        - '[a-z'
        - '\w+'
        - '.*@'

