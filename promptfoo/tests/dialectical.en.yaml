# EN eval case: dialectical behaviour (one file per behaviour).
# Assertions case-insensitive. The advisory slop-footer check lives in defaultTest.

- description: en-dialectical
  vars:
    prompt: 'Answer this dialectically: is it better to be loved or to be feared?'
  assert:
    - type: icontains-any
      value:
        - negat
        - opposit
        - contradic
        - sublat
        - mediat
        - unity
        - Spirit
        - recognition
        - Anerkennung
        - dialectic
        - master
        - bondsman
        - Verstand
    # Embedding-similarity to a curated reference answer (#32) — advisory (weight
    # 0), local Ollama embeddings. Records similarity_dialectical; loose threshold.
    - type: similar
      value: file://promptfoo/references/dialectical.en.md
      threshold: 0.5
      weight: 0
      metric: similarity_dialectical
